<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finanças Dark Mode</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Painel de Finanças</h1>
            <div class="summary">
                <div class="card">
                    <span>Receitas</span>
                    <h2 id="total-income">R$ 0,00</h2>
                </div>
                <div class="card">
                    <span>Despesas</span>
                    <h2 id="total-expense">R$ 0,00</h2>
                </div>
                <div class="card">
                    <span>Saldo</span>
                    <h2 id="total-balance">R$ 0,00</h2>
                </div>
            </div>
        </header>

        <main>
            <section class="goal-section">
                <h3>Meta de Poupança</h3>
                <div class="progress-container">
                    <div class="progress-bar" id="goal-progress">0%</div>
                </div>
                <p>Progresso: <span id="goal-value">R$ 0 / R$ 5.000</span></p>
            </section>

            <div class="grid">
                <section class="chart-container">
                    <h3>Gastos por Categoria</h3>
                    <canvas id="categoryChart"></canvas>
                </section>

                <section class="form-container">
                    <h3>Nova Transação</h3>
                    <form id="transaction-form">
                        <input type="text" id="desc" placeholder="Descrição" required>
                        <input type="number" id="amount" placeholder="Valor (R$)" required>
                        <select id="category">
                            <option value="Lazer">Lazer</option>
                            <option value="Alimentação">Alimentação</option>
                            <option value="Transporte">Transporte</option>
                            <option value="Contas">Contas</option>
                        </select>
                        <button type="submit">Adicionar</button>
                    </form>
                </section>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
